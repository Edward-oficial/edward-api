<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin • Edward API</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script>
(function(){

    // Debe coincidir con ADMIN_EMAIL de utils/seedAdmin.js
    const ADMIN_EMAIL = "cololacalempira5@gmail.com";

    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "/login";
        return;
    }

    try{

        const payload = JSON.parse(atob(token.split(".")[1]));

        if(payload.exp && Date.now() >= payload.exp * 1000){
            localStorage.removeItem("token");
            window.location.href = "/login";
            return;
        }

        if(payload.username !== ADMIN_EMAIL){
            window.location.href = "/";
        }

    }catch(err){
        window.location.href = "/login";
    }

})();
</script>
</head>

<body>

<header class="topbar">
<button class="hamburger" onclick="toggleMenu()" aria-label="Menú">
<span></span><span></span><span></span>
</button>
<div class="brand">Edward API</div>
<span id="userBadge" class="userBadge"></span>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<nav class="sidemenu" id="sideMenu">
<div class="sidemenu-title">Categorías</div>
<a href="/" class="menu-link">Inicio</a>
<a href="/search" class="menu-link">Search</a>
<a href="/descargas" class="menu-link">Descargas</a>
<a href="/anime" class="menu-link">Anime</a>

<div class="sidemenu-title" style="margin-top:20px;">Cuenta</div>
<a href="/admin" class="menu-link active">Panel Admin</a>
<a href="#" class="menu-link" onclick="logout();return false;">Cerrar sesión</a>
</nav>

<div class="container">

<h2>Panel Admin</h2>
<p class="subtitle" style="margin-bottom:20px;text-align:left;">Usuarios registrados</p>

<div id="usersBox" class="empty">
Cargando usuarios...
</div>

</div>

<div class="toast" id="toast">
Copiado al portapapeles
</div>

<script src="/js/app.js"></script>
<script>

async function loadUsers(){

    const box = document.getElementById("usersBox");
    const token = localStorage.getItem("token");

    try{

        const res = await fetch("/admin/users", {
            headers: { Authorization: "Bearer " + token }
        });

        const data = await res.json();

        if(!data.status){
            box.textContent = data.error || "Error al cargar usuarios.";
            return;
        }

        if(!data.users.length){
            box.textContent = "No hay usuarios registrados todavía.";
            return;
        }

        box.innerHTML = "";
        box.className = "";

        data.users.forEach(u => {

            const card = document.createElement("div");
            card.className = "card";

            const path = document.createElement("div");
            path.className = "path";
            path.textContent = u.username + (u.role === "admin" ? " (admin)" : "");

            const desc = document.createElement("div");
            desc.className = "desc";
            desc.textContent = "Registrado: " + new Date(u.createdAt).toLocaleString();

            card.appendChild(path);
            card.appendChild(desc);
            box.appendChild(card);

        });

    }catch(err){
        box.textContent = "Error al cargar usuarios: " + err.message;
    }

}

document.addEventListener("DOMContentLoaded", function(){

    const token = localStorage.getItem("token");

    if(token){
        try{
            const payload = JSON.parse(atob(token.split(".")[1]));
            const badge = document.getElementById("userBadge");
            if(badge) badge.textContent = payload.username;
        }catch(err){}
    }

    loadUsers();

});

</script>

</body>
</html>
