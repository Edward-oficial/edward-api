<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward API</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #00f5ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .endpoints {
            margin: 40px auto;
            max-width: 800px;
            text-align: left;
        }
        .endpoint {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #00f5ff;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        pre {
            background: #111;
            padding: 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Edward API</h1>
    <p>API por Edward - Rápida y extensible</p>

    <div class="endpoints">
        <h2>Endpoints disponibles</h2>
        <div class="endpoint">
            <div><strong>/</strong> - Página de inicio</div>
            <button class="btn" onclick="testEndpoint('/')">Probar</button>
        </div>
        <div class="endpoint">
            <div><strong>/search/yt?q=bad bunny</strong> - Búsqueda YouTube</div>
            <button class="btn" onclick="testEndpoint('/search/yt?q=bad%20bunny')">Probar</button>
        </div>
        <div class="endpoint">
            <div><strong>/ejemplo/ping</strong> - Ejemplo</div>
            <button class="btn" onclick="testEndpoint('/ejemplo/ping')">Probar</button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        async function testEndpoint(path) {
            const res = await fetch(path);
            const data = await res.json();
            document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
    </script>
</body>
</html>
