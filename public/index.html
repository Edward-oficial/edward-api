<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward API</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
        :root {
            --bg: #0a0a0a;
            --accent: #00f5ff;
            --text: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.4);
        }
        .endpoints {
            margin-top: 3rem;
            text-align: left;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
        }
        code {
            font-family: 'JetBrains Mono', monospace;
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edward API</h1>
        <p>API rápida, limpia y fácil de extender.<br>Desarrollada por Edward.</p>
        
        <a href="/api/status" class="btn">Ver Estado de la API</a>
        <a href="https://github.com/Edward-oficial/edward-api" target="_blank" class="btn">Ver en GitHub</a>

        <div class="endpoints">
            <h2>Endpoints disponibles</h2>
            <p><strong>/</strong> — Esta página</p>
            <p><strong>/ejemplo/ping</strong> — Ejemplo</p>
            <p>Agrega tus propios endpoints en la carpeta <code>endpoints/</code></p>
        </div>
    </div>
</body>
</html>
